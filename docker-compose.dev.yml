version: "3.8"

services:
  # ============================================
  # Database - PostgreSQL
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: keyraccoon_postgres_dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: keyraccoon
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    networks:
      - keyraccoon-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Cache - Redis
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: keyraccoon_redis_dev
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    networks:
      - keyraccoon-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Backend API - Go/Fiber (Development with hot reload)
  # ============================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: keyraccoon_backend_dev
    environment:
      # Server Configuration
      SERVER_PORT: 3000
      SERVER_HOST: 0.0.0.0
      ENVIRONMENT: development
      
      # Database Configuration
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: password
      DB_NAME: keyraccoon
      DB_SSLMODE: disable
      
      # Redis Configuration
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASS: ""
      REDIS_DB: 0
      
      # JWT Configuration
      JWT_SECRET: dev-secret-key
      JWT_EXPIRE: 60
      
      # Admin Configuration
      ADMIN_EMAIL: admin@keyraccoon.com
      ADMIN_PASSWORD: AdminPassword123
      
      # CORS Configuration
      CORS_ORIGIN: "*"
    ports:
      - "3000:3000"
    volumes:
      # Mount source code for hot reload
      - .:/app
      - /app/bin
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - keyraccoon-network
    command: ["air", "-c", ".air.toml"]

  # ============================================
  # Frontend - React/Vite (Development with hot reload)
  # ============================================
  frontend:
    image: node:20-alpine
    container_name: keyraccoon_frontend_dev
    working_dir: /app
    environment:
      VITE_API_BASE_URL: http://localhost:3000
    ports:
      - "5173:5173"
    volumes:
      # Mount frontend source code for hot reload
      - ./frontend:/app
      - /app/node_modules
    networks:
      - keyraccoon-network
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend

# ============================================
# Networks
# ============================================
networks:
  keyraccoon-network:
    driver: bridge

# ============================================
# Volumes
# ============================================
volumes:
  postgres_dev_data:
    driver: local
  redis_dev_data:
    driver: local
