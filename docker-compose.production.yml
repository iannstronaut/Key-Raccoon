version: "3.8"

services:
  # ============================================
  # Database - PostgreSQL
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: keyraccoon_postgres_prod
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-CHANGE_THIS_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-keyraccoon}
    ports:
      - "5432:5432"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - ./backups:/backups
    networks:
      - keyraccoon-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # Cache - Redis
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: keyraccoon_redis_prod
    command: redis-server --appendonly yes --requirepass ${REDIS_PASS:-CHANGE_THIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_prod_data:/data
    networks:
      - keyraccoon-network
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASS:-CHANGE_THIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # Backend API - Go/Fiber
  # ============================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: keyraccoon_backend_prod
    environment:
      # Server Configuration
      SERVER_PORT: 3000
      SERVER_HOST: 0.0.0.0
      ENVIRONMENT: production
      
      # Database Configuration
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-CHANGE_THIS_PASSWORD}
      DB_NAME: ${DB_NAME:-keyraccoon}
      DB_SSLMODE: require
      
      # Redis Configuration
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASS: ${REDIS_PASS:-CHANGE_THIS_PASSWORD}
      REDIS_DB: 0
      
      # JWT Configuration
      JWT_SECRET: ${JWT_SECRET:-CHANGE_THIS_SECRET}
      JWT_EXPIRE: 60
      
      # Admin Configuration
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@keyraccoon.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-CHANGE_THIS_PASSWORD}
      
      # CORS Configuration
      CORS_ORIGIN: ${CORS_ORIGIN:-https://yourdomain.com}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - keyraccoon-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # Frontend - React/Vite with Nginx
  # ============================================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://api.yourdomain.com}
    container_name: keyraccoon_frontend_prod
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - keyraccoon-network
    volumes:
      # Mount SSL certificates if using HTTPS
      - ./ssl:/etc/nginx/ssl:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ============================================
# Networks
# ============================================
networks:
  keyraccoon-network:
    driver: bridge

# ============================================
# Volumes
# ============================================
volumes:
  postgres_prod_data:
    driver: local
  redis_prod_data:
    driver: local
